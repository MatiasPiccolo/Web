<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Inversiones y Comercio Exterior - PBA</title>
    <style>
        /* Paleta de Colores Identidad GBA */
        :root {
            --azul-institucional: #0056b3;
            --azul-oscuro: #003670;
            --celeste-gba: #00aae4;
            --gris-oscuro: #333333;
            --gris-medio: #666666;
            --gris-claro: #f8f9fa;
            --blanco: #ffffff;
            --borde-linea: #cbd5e1;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            color: var(--gris-oscuro);
            line-height: 1.6;
            background-color: var(--blanco);
            padding-bottom: 60px;
        }

        /* Encabezado e Introducción */
        .header-monitor {
            background-color: var(--gris-claro);
            padding: 40px 0;
            text-align: center;
            border-bottom: 1px solid #e2e8f0;
            margin-bottom: 40px;
        }

        .header-monitor h1 {
            font-size: 2.2rem;
            color: var(--azul-oscuro);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: -0.5px;
        }

        .header-monitor p {
            font-size: 1.1rem;
            color: var(--gris-medio);
            max-width: 850px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Contenedor de Bloques */
        .monitor-sections {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .accordion-block {
            border: 1px solid var(--borde-linea);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.02);
            background-color: var(--blanco);
        }

        /* Encabezado del Bloque Desplegable */
        .accordion-header {
            background-color: var(--azul-oscuro);
            color: var(--blanco);
            width: 100%;
            padding: 18px 20px;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            text-align: left;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background-color 0.2s;
        }

        .accordion-header:hover {
            background-color: var(--azul-institucional);
        }

        .accordion-icon {
            font-size: 0.8rem;
            transition: transform 0.3s ease;
        }

        /* Estados de Animación del Acordeón */
        .accordion-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        /* Cuando está activo se expande y rota la flecha */
        .accordion-block.active .accordion-content {
            max-height: 1200px;
            transition: max-height 0.5s ease-in;
        }

        .accordion-block.active .accordion-icon {
            transform: rotate(180deg);
        }

        /* Listado de Informes (Filas Internas) */
        .pdf-list {
            padding: 10px 20px;
        }

        .pdf-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .pdf-row:last-child {
            border-bottom: none;
        }

        .pdf-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Etiquetas Temáticas Cuadradas fijas */
        .pdf-type-icon {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 55px;
            height: 32px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Colores específicos para cada tipo de informe */
        .icon-c-e { background-color: #e0f2fe; color: #0369a1; }
        .icon-i-b { background-color: #fef3c7; color: #b45309; }
        .icon-i-p { background-color: #dcfce7; color: #15803d; }
        .icon-f-a { background-color: #f3e8ff; color: #6b21a8; }

        .pdf-title {
            font-size: 1rem;
            color: var(--gris-oscuro);
            font-weight: 500;
        }

        /* Botones de Acción Internos */
        .pdf-actions {
            display: flex;
            gap: 10px;
        }

        .btn-view, .btn-download-pdf {
            padding: 6px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 4px;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-view {
            background-color: var(--gris-claro);
            color: var(--gris-oscuro);
            border: 1px solid var(--borde-linea);
        }

        .btn-view:hover {
            background-color: #cbd5e1;
            color: var(--gris-oscuro);
        }

        .btn-download-pdf {
            background-color: var(--azul-institucional);
            color: var(--blanco);
            border: 1px solid var(--azul-institucional);
        }

        .btn-download-pdf:hover {
            background-color: var(--azul-oscuro);
            border-color: var(--azul-oscuro);
        }

        /* Ajustes Mobile */
        @media (max-width: 600px) {
            .pdf-row {
                flex-direction: column;
                align-items: start;
                gap: 12px;
            }
            .pdf-actions {
                width: 100%;
                justify-content: flex-end;
            }
        }
    </style>
</head>
<body>

    <header class="header-monitor">
        <div class="container">
            <h1>Monitor de Inversiones y Comercio Exterior</h1>
            <p>Informes técnicos y de coyuntura para el seguimiento de la actividad económica global, nacional y provincial.</p>
        </div>
    </header>

    <main class="container">
        <div class="monitor-sections">

            <div class="accordion-block active">
                <button class="accordion-header" onclick="toggleAccordion(this)">
                    Informes de Inversiones (M&amp;A)
                    <span class="accordion-icon">▼</span>
                </button>
                <div class="accordion-content">
                    <div class="pdf-list">
                        <div class="pdf-row">
                            <div class="pdf-info">
                                <span class="pdf-type-icon icon-f-a">M&amp;A</span>
                                <span class="pdf-title">Segundo Semestre 2021</span>
                            </div>
                            <div class="pdf-actions">
                                <a href="#" target="_blank" class="btn-view">Ver</a>
                                <a href="#" download class="btn-download-pdf">PDF</a>
                            </div>
                        </div>
                        <div class="pdf-row">
                            <div class="pdf-info">
                                <span class="pdf-type-icon icon-f-a">M&amp;A</span>
                                <span class="pdf-title">Primer semestre 2021</span>
                            </div>
                            <div class="pdf-actions">
                                <a href="#" target="_blank" class="btn-view">Ver</a>
                                <a href="#" download class="btn-download-pdf">PDF</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        function toggleAccordion(button) {
            const block = button.parentElement;
            block.classList.toggle('active');
        }
    </script>
</body>
</html>
